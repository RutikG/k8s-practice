apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: limit
  name: limit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: limit
  template:
    metadata:
      labels:
        app: limit
    spec:
      containers:
      - image: rutikg/forfun:v2
        name: forfun
   
        resources:      
         requests:
          cpu: 2m
          memory: 5Mi

         limits:
          cpu: 10m
          memory: 100Mi
