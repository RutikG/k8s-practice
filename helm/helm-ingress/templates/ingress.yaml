apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helm-ingress
  namespace: default
spec:
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - backend:
          service:
            name: custom-svc
            port:
              number: 8080
        path: /custom
        pathType: Prefix
      - backend:
          service:
            name: new-svc
            port:
              number: 8080
        path: /new
        pathType: Prefix
