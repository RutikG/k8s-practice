apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: limit
  name: limit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: limit
  template:
    metadata:
      labels:
        app: limit
    spec:
      containers:
      - image: rutikg/forfun:v2
        name: forfun
   
        resources:      
         requests:
          cpu: {{ .Values.resources.requests.cpu }}
          memory: {{ .Values.resources.requests.memory }}

         limits:
          cpu: {{ .Values.resources.limits.cpu }}
          memory: {{ .Values.resources.limits.memory }}
