apiVersion: apps/v1
kind: Deployment
metadata:
 name: liv-rea
 labels:
  app: nginx
spec:
 replicas: 1
 selector:
  matchLabels:
   app: nginx
 template:
  metadata:
   labels:
    app: nginx
  spec:
   containers:
   - name: nginx
     image: nginx:stable

     readinessProbe:
      httpGet:
       path: /
       port: 80
      initialDelaySeconds: 5
      periodSeconds: 5

     livenessProbe:
       httpGet:
        path: /
        port: 80
       initialDelaySeconds: 5
       periodSeconds: 5
